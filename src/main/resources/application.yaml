spring:
  application:
    name: ${APP_NAME:spring-eureka}
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=10000,expireAfterWrite=30s
  batch:
    jdbc:
      initialize-schema: embedded
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:file:./data/EUREKADB;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
    properties:
      dialect: org.hibernate.dialect.H2Dialect
server:
  port: ${PORT:8761}
  servlet:
    context-path: ${SERVER_CONTEXT_PATH:/}
eureka:
  datacenter: 'local'
  environment: 'development'
  server:
    peer-node-read-timeout-ms: 3000
  instance:
    leaseRenewalIntervalInSeconds: 30
    health-check-url-path: /actuator/health
    preferIpAddress: ${EUREKA_INSTANCE_PREFER_IP_ADDRESS:false}
    metadata-map:
      user.name: ${SPRING_REGISTER_METRICS_USERNAME:metrics}
      user.password: ${SPRING_REGISTER_METRICS_PASSWORD:changeit}
  client:
    registryFetchIntervalSeconds: ${EUREKA_CLIENT_FETCH_REGISTRY_INTERVAL_SECONDS:30}
    register-with-eureka: ${EUREKA_CLIENT_REGISTER_WITH_EUREKA:false}
    fetch-registry: ${EUREKA_CLIENT_FETCH_REGISTRY:false}
    serviceUrl:
      defaultZone: ${EUREKA_CLIENT_SERVICE_URL:http://localhost:${server.port}/eureka/}
management:
  server:
    port: ${MANAGEMENT_PORT:8761}
  info:
    env.enabled: true
    java.enabled: true
    os.enabled: true
    process.enabled: true
    git.enabled: true
    git.mode: full
  endpoints:
    jmx.exposure.include: "*"
    web:
      exposure:
        include: '*'
      cors:
        allowed-origins: ${MANAGEMENT_CORS_ALLOWED_ORIGINS:'*'}
        allowed-methods: ${MANAGEMENT_CORS_ALLOWED_METHODS:'*'}
        max-age: ${MANAGEMENT_CORS_ALLOWED_MAXAGE:3600}
  endpoint:
    health:
      show-details: always
      show-components: always
    env:
      show-values: always
    configprops:
      show-values: always
  tracing:
    enabled: ${MANAGEMENT_TRACING_ENABLED:true}
    sampling:
      probability: ${MANAGEMENT_TRACING_SAMPLING_PROBABILITY:1.0}
  otlp:
    metrics:
      export:
        enabled: ${MANAGEMENT_OTLP_METRICS_EXPORT_ENABLED:true}
        url: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318}/v1/metrics
        batchSize: ${OTEL_EXPORTER_OTLP_BATCH_SIZE:100}
        aggregationTemporality: ${OTEL_EXPORTER_OTLP_AGGREGATION_TEMPORALITY:cumulative}
        step: ${OTEL_EXPORTER_OTLP_AGGREGATION_STEP:1m}
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318}/v1/traces
      export:
        enabled: ${MANAGEMENT_OTLP_TRACING_EXPORT_ENABLED:true}
    logging:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318}/v1/logs
      export:
        enabled: ${MANAGEMENT_OTLP_LOGGING_EXPORT_ENABLED:true}
